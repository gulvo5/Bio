<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bio</title>
    <!-- Подключаем красивые иконки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c1b, #201335, #0f0c1b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Главный контейнер-карточка */
        .bio-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px rgba(255, 255, 255, 0.1) solid;
            border-radius: 24px;
            padding: 35px 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Аватарка */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #b388ff;
            box-shadow: 0 0 20px rgba(179, 136, 255, 0.5);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .age {
            font-size: 0.9rem;
            color: #b388ff;
            margin-bottom: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Музыкальный плеер */
        .player-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 15px;
            margin-top: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .player-title {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .track-info {
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 12px;
            color: #fff;
            min-height: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s ease;
        }

        .btn:hover {
            color: #b388ff;
            transform: scale(1.1);
        }

        .btn-play {
            font-size: 1.8rem;
            background: #b388ff;
            color: #0f0c1b;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.4);
        }

        .btn-play:hover {
            color: #fff;
            background: #9d66ff;
            transform: scale(1.05);
        }

        /* Список треков */
        .playlist {
            list-style: none;
            margin-top: 15px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Стилизация скроллбара */
        .playlist::-webkit-scrollbar {
            width: 4px;
        }
        .playlist::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .playlist-item {
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .playlist-item.active {
            background: rgba(179, 136, 255, 0.2);
            color: #b388ff;
            font-weight: bold;
        }

        /* Соцсети/Ссылки */
        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .social-link {
            color: #fff;
            font-size: 1.4rem;
            text-decoration: none;
            transition: color 0.3s, transform 0.3s;
        }

        .social-link:hover {
            color: #b388ff;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="bio-card">
        <!-- Аватарка (имя файла должно быть avatar.png) -->
        <img src="avatar.png" alt="Avatar" class="avatar">
        
        <!-- Твое имя / никнейм -->
        <h1>Твой Ник / Имя</h1>
        <div class="age">14 years old</div>

        <!-- Аудиоплеер -->
        <div class="player-container">
            <div class="player-title">Сейчас играет</div>
            <div class="track-info" id="track-title">Выберите трек</div>
            
            <audio id="audio-player" src=""></audio>
            
            <div class="controls">
                <button class="btn" id="prev-btn"><i class="fas fa-backward"></i></button>
                <button class="btn btn-play" id="play-btn"><i class="fas fa-play"></i></button>
                <button class="btn" id="next-btn"><i class="fas fa-forward"></i></button>
            </div>

            <ul class="playlist" id="playlist">
                <!-- Плейлист -->
                <li class="playlist-item active" data-src="yashelegem.mp3">
                    <span>Рустам Асадуллин — Яшьлегем</span>
                    <i class="fas fa-music"></i>
                </li>
                <li class="playlist-item" data-src="kochaklama.mp3">
                    <span>Анвар Нургалиев — Кочаклама...</span>
                    <i class="fas fa-music"></i>
                </li>
                <li class="playlist-item" data-src="yalgiz_torna.mp3">
                    <span>Фирдус Тямаев — Ялгыз Торна</span>
                    <i class="fas fa-music"></i>
                </li>
                <li class="playlist-item" data-src="chakyr_gina_mine.mp3">
                    <span>Ринат Рахматуллин — Чакыр...</span>
                    <i class="fas fa-music"></i>
                </li>
            </ul>
        </div>

        <!-- Кнопки соцсетей (замени решетки '#' на свои ссылки) -->
        <div class="socials">
            <a href="#" target="_blank" class="social-link"><i class="fab fa-github"></i></a>
            <a href="#" target="_blank" class="social-link"><i class="fab fa-telegram"></i></a>
            <a href="#" target="_blank" class="social-link"><i class="fab fa-vk"></i></a>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const trackTitle = document.getElementById('track-title');
        const playlistItems = document.querySelectorAll('.playlist-item');

        let currentTrackIndex = 0;
        let isPlaying = false;

        // Загрузка трека
        function loadTrack(index) {
            playlistItems.forEach(item => item.classList.remove('active'));
            const activeItem = playlistItems[index];
            activeItem.classList.add('active');
            
            audio.src = activeItem.getAttribute('data-src');
            trackTitle.textContent = activeItem.querySelector('span').textContent;
        }

        // Воспроизведение / Пауза
        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
            } else {
                audio.play().catch(e => console.log("Нажмите на страницу для воспроизведения"));
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            }
            isPlaying = !isPlaying;
        }

        // Переключение треков
        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % playlistItems.length;
            loadTrack(currentTrackIndex);
            if (isPlaying) audio.play();
        }

        function prevTrack() {
            currentTrackIndex = (currentTrackIndex - 1 + playlistItems.length) % playlistItems.length;
            loadTrack(currentTrackIndex);
            if (isPlaying) audio.play();
        }

        // События кликов
        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextTrack);
        prevBtn.addEventListener('click', prevTrack);

        // Клик по треку в списке
        playlistItems.forEach((item, index) => {
            item.addEventListener('click', () => {
                currentTrackIndex = index;
                loadTrack(currentTrackIndex);
                isPlaying = false;
                togglePlay();
            });
        });

        // Автопереключение по окончании трека
        audio.addEventListener('ended', nextTrack);

        // Инициализация первого трека
        loadTrack(currentTrackIndex);
    </script>
</body>
</html>
