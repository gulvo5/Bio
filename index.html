<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Леон — Bio</title>
    <!-- Подключение иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Палитра Claude */
            --color-bone-parchment: #f8f8f6;
            --color-paper-white: #ffffff;
            --color-soft-stone: #efeeeb;
            --color-carbon-ink: #121212;
            --color-graphite: #373734;
            --color-ashen: #7b7974;
            --color-mist: #b7b7b5;
            --color-chalk: #e7e6e1;
            --color-clay: #d97757;

            /* Шрифты */
            --font-serif: Georgia, Cambria, "Times New Roman", Times, serif;
            --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-bone-parchment);
            color: var(--color-carbon-ink);
            font-family: var(--font-sans);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        /* Главная карточка */
        .bio-card {
            background-color: var(--color-paper-white);
            border: 1px solid var(--color-chalk);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: rgba(0, 0, 0, 0.04) 0px 4px 20px 0px;
        }

        /* Аватарка */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--color-mist);
            margin-bottom: 24px;
        }

        /* Имя */
        h1 {
            font-family: var(--font-serif);
            font-size: 24px;
            font-weight: 400;
            color: var(--color-carbon-ink);
            margin-bottom: 8px;
        }

        /* Возраст */
        .age {
            font-size: 14px;
            color: var(--color-ashen);
            margin-bottom: 32px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .age::after {
            content: "•";
            color: var(--color-clay);
            font-size: 16px;
        }

        /* Контейнер плеера */
        .player-container {
            background-color: var(--color-soft-stone);
            border-radius: 16px;
            padding: 24px 16px;
            margin-bottom: 24px;
        }

        .player-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--color-ashen);
            margin-bottom: 12px;
        }

        /* Обложка трека (стиль Spotify / Claude) */
        .track-cover-wrapper {
            width: 140px;
            height: 140px;
            margin: 0 auto 16px auto;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--color-mist);
            box-shadow: rgba(0, 0, 0, 0.06) 0px 2px 8px 0px;
            background-color: var(--color-chalk);
        }

        .track-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .track-info {
            font-family: var(--font-serif);
            font-size: 16px;
            font-weight: 400;
            color: var(--color-carbon-ink);
            margin-bottom: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 8px;
        }

        /* Кнопки управления */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin-bottom: 20px;
        }

        .btn {
            background: none;
            border: none;
            color: var(--color-graphite);
            cursor: pointer;
            font-size: 16px;
            transition: color 0.2s ease, transform 0.1s ease;
        }

        .btn:hover {
            color: var(--color-carbon-ink);
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Кнопка Play/Pause */
        .btn-play {
            background-color: var(--color-carbon-ink);
            color: var(--color-bone-parchment);
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .btn-play:hover {
            background-color: var(--color-graphite);
            color: var(--color-bone-parchment);
        }

        /* Список воспроизведения */
        .playlist {
            list-style: none;
            text-align: left;
            max-height: 160px;
            overflow-y: auto;
            padding-right: 4px;
            border-top: 1px solid var(--color-chalk);
            padding-top: 12px;
        }

        .playlist::-webkit-scrollbar {
            width: 3px;
        }
        .playlist::-webkit-scrollbar-thumb {
            background: var(--color-mist);
            border-radius: 2px;
        }

        .playlist-item {
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            font-size: 13px;
            color: var(--color-graphite);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s, color 0.2s;
        }

        .playlist-item:hover {
            background-color: rgba(0, 0, 0, 0.03);
            color: var(--color-carbon-ink);
        }

        .playlist-item.active {
            background-color: rgba(0, 0, 0, 0.05);
            color: var(--color-carbon-ink);
            font-weight: 500;
        }

        /* Кнопка Telegram */
        .telegram-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--color-carbon-ink);
            color: var(--color-bone-parchment);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 8px;
            transition: background-color 0.2s ease;
            width: 100%;
        }

        .telegram-btn:hover {
            background-color: var(--color-graphite);
        }
    </style>
</head>
<body>

    <div class="bio-card">
        <!-- Твое изображение -->
        <img src="avatar.png" alt="Аватар" class="avatar">
        
        <!-- Твое имя -->
        <h1>Леон</h1>
        <div class="age">14 лет</div>

        <!-- Минималистичный аудиоплеер -->
        <div class="player-container">
            <div class="player-title">Сейчас играет</div>
            
            <!-- Обложка трека -->
            <div class="track-cover-wrapper">
                <img id="track-cover" src="cover_yashelegem.jpg" alt="Обложка" class="track-cover">
            </div>

            <div class="track-info" id="track-title">Выберите песню</div>
            
            <audio id="audio-player" src=""></audio>
            
            <div class="controls">
                <button class="btn" id="prev-btn"><i class="fas fa-backward"></i></button>
                <button class="btn btn-play" id="play-btn"><i class="fas fa-play"></i></button>
                <button class="btn" id="next-btn"><i class="fas fa-forward"></i></button>
            </div>

            <!-- Плейлист с путями к песням и их обложкам -->
            <ul class="playlist" id="playlist">
                <li class="playlist-item active" data-src="yashelegem.mp3" data-cover="cover_yashelegem.jpg">
                    <span>Рустам Асадуллин — Яшьлегем</span>
                    <i class="fas fa-music"></i>
                </li>
                <li class="playlist-item" data-src="kochaklama.mp3" data-cover="cover_kochaklama.jpg">
                    <span>Анвар Нургалиев — Кочаклама яратмыйча</span>
                    <i class="fas fa-music"></i>
                </li>
                <li class="playlist-item" data-src="yalgiz_torna.mp3" data-cover="cover_yalgiz.jpg">
                    <span>Фирдус Тямаев — Ялгыз Торна</span>
                    <i class="fas fa-music"></i>
                </li>
                <li class="playlist-item" data-src="chakyr_gina_mine.mp3" data-cover="cover_chakyr.jpg">
                    <span>Ринат Рахматуллин — Чакыр гына мине</span>
                    <i class="fas fa-music"></i>
                </li>
            </ul>
        </div>

        <!-- Твой Telegram профиль -->
        <a href="https://t.me/JanKlod22487" target="_blank" class="telegram-btn">
            <i class="fab fa-telegram-plane"></i> Связаться в Telegram
        </a>
    </div>

    <script>
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const trackTitle = document.getElementById('track-title');
        const trackCover = document.getElementById('track-cover');
        const playlistItems = document.querySelectorAll('.playlist-item');

        let currentTrackIndex = 0;
        let isPlaying = false;

        function loadTrack(index) {
            playlistItems.forEach(item => item.classList.remove('active'));
            const activeItem = playlistItems[index];
            activeItem.classList.add('active');
            
            audio.src = activeItem.getAttribute('data-src');
            trackTitle.textContent = activeItem.querySelector('span').textContent;
            
            // Анимация смены обложки
            trackCover.style.opacity = '0.3';
            setTimeout(() => {
                trackCover.src = activeItem.getAttribute('data-cover');
                trackCover.style.opacity = '1';
            }, 150);
        }

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
            } else {
                audio.play().catch(e => console.log("Для старта музыки нужно кликнуть по странице"));
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            }
            isPlaying = !isPlaying;
        }

        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % playlistItems.length;
            loadTrack(currentTrackIndex);
            if (isPlaying) audio.play().catch(e => {});
        }

        function prevTrack() {
            currentTrackIndex = (currentTrackIndex - 1 + playlistItems.length) % playlistItems.length;
            loadTrack(currentTrackIndex);
            if (isPlaying) audio.play().catch(e => {});
        }

        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextTrack);
        prevBtn.addEventListener('click', prevTrack);

        playlistItems.forEach((item, index) => {
            item.addEventListener('click', () => {
                currentTrackIndex = index;
                loadTrack(currentTrackIndex);
                isPlaying = false;
                togglePlay();
            });
        });

        audio.addEventListener('ended', nextTrack);
        loadTrack(currentTrackIndex);
    </script>
</body>
</html>
